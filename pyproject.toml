[tool.ruff]
line-length = 120
target-version = "py314"
src = ["backend"]
force-exclude = true

[tool.ruff.lint]
select = ["B", "C90", "E4", "E7", "E9", "F", "I", "N", "SIM", "UP"]

[tool.ruff.lint.isort]
known-first-party = ["app", "tests", "utils"]
known-third-party = ["alembic"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401"]

[tool.mypy]
plugins = ["pydantic.mypy"]
