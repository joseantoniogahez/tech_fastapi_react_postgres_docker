[tool.ruff]
line-length = 120
target-version = "py314"
src = ["backend"]
force-exclude = true

[tool.ruff.lint]
select = ["B", "C90", "E4", "E7", "E9", "F", "I", "N", "SIM", "TID", "UP"]

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.lint.isort]
known-first-party = ["app", "tests", "utils"]
known-third-party = ["alembic"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401"]

[tool.mypy]
plugins = ["pydantic.mypy"]

[tool.coverage.run]
source = ["backend/app"]
omit = [
    "backend/app/core/common/integration.py",
    "backend/app/integrations/broker.py",
    "backend/app/integrations/files.py",
    "backend/app/integrations/jobs.py",
    "backend/app/integrations/search.py",
]
